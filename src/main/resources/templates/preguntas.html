<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPlanner - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/estilos.css">

    <link rel="icon" type="image/png" href="/img/isotipo.png">
</head>

<body class="vh-100 d-flex align-items-center justify-content-center bg-light">
<div class="position-absolute top-0 end-0 p-4" style="z-index: 1050;">
    <button id="btn-modo-oscuro" class="btn btn-icon border-0 bg-transparent text-secondary fs-4"
            onclick="cambiarTema()"> <i class="bi bi-moon-stars-fill"></i>
    </button>
</div>

<div class="card-login p-4 w-100 shadow" style="max-width: 450px; min-height: 550px;">
    <div id="contenido-registro">
        <div class="text-center mb-4">
            <img src="/img/imagotipo.png" alt="UniPlanner Logo" class="img-fluid d-block mx-auto mb-2" style="max-height: 60px;">
            <p class="text-secondary small">Facultad de Ingeniería Mecánica y Eléctrica</p>
            <h4 class="text-primary fw-bold">Preguntas de Seguridad</h4>
            <p class="small text-muted">Estás a un paso de completar tu acceso, <span th:text="${nombreUsuario}">Usuario</span>.</p>
        </div>

        <form action="/api/preguntas" method="POST">
            <div class="mb-3">
                <label class="small text-secondary">1. ¿Nombre de tu primera mascota?</label>
                <input type="text" name="respuesta1" class="form-control border-secondary" required placeholder="Tu respuesta">
            </div>

            <div class="mb-3">
                <label class="small text-secondary">2. ¿Ciudad de nacimiento?</label>
                <input type="text" name="respuesta2" class="form-control border-secondary" required placeholder="Tu respuesta">
            </div>

            <div class="mb-4">
                <label class="small text-secondary">3. ¿Nombre de tu escuela primaria?</label>
                <input type="text" name="respuesta3" class="form-control border-secondary" required placeholder="Tu respuesta">
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2">Finalizar Registro</button>
        </form>

        <div class="text-center mt-3">
            <span class="small text-secondary">¿Ya tienes cuenta? </span>
            <a href="/login" class="small text-primary text-decoration-none fw-bold">Inicia Sesión</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:inline="javascript">
    window.alertaError = [[${alertaError}]];
    window.alertaSuccess = [[${alertaSuccess}]];
    const temaPrevio = localStorage.getItem('temaUniPlanner') || 'light';
    document.documentElement.setAttribute('data-bs-theme', temaPrevio);
</script>

<script src="/js/login.js"></script>
</body>
</html>
