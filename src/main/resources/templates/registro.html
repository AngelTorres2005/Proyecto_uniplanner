<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPlanner - Crear Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="icon" type="image/png" href="/img/isotipo.png">
</head>

<body class="vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="position-absolute top-0 end-0 p-4" style="z-index: 1050;">
        <button id="btn-modo-oscuro" class="btn btn-icon border-0 bg-transparent text-secondary fs-4"
            onclick="cambiarTema()">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>
    <div class="card-login p-4 w-100 shadow" style="max-width: 450px; min-height: 550px;">
        <div id="formulario-registro">
            <div class="text-center mb-4">
                <img src="/img/imagotipo.png" alt="UniPlanner Logo" class="img-fluid d-block mx-auto mb-2"
                    style="max-height: 60px;">
                <p class="text-secondary small">Facultad de Ingeniería Mecánica y Eléctrica</p>
                <h4 class="text-primary fw-bold">Crear Cuenta</h4>
            </div>
            <form action="/api/registro" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="small text-secondary">Nombre(s)</label>
                        <input type="text" name="nombre" class="form-control border-secondary" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="small text-secondary">Apellidos</label>
                        <input type="text" name="apellidos" class="form-control border-secondary" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="small text-secondary">Correo Universitario</label>
                    <input type="email" name="correo" class="form-control border-secondary" required placeholder="@uanl.edu.mx">
                </div>
                <div class="mb-3">
                    <label class="small text-secondary">Contraseña</label>
                    <input type="password" name="password" class="form-control border-secondary" minlength="8" maxlength="8" required placeholder="Mínimo 8 caracteres">
                </div>
                <div class="mb-4">
                    <label class="small text-secondary">Confirmar Contraseña</label>
                    <input type="password" name="confirmarPassword" class="form-control  border-secondary" minlength="8" maxlength="8"  required placeholder="Repite tu contraseña">
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2">Registrarme</button>
            </form>
            <div class="text-center mt-3">
                <span class="small text-secondary">¿Ya tienes cuenta? </span>
                <a href="/login" class="small text-primary text-decoration-none fw-bold">Inicia Sesión</a>
            </div>
        </div>
        <div id="cargando" class="text-center d-none py-5">
            <img src="/img/isotipo.png" alt="Configurando..." class="animacion-fija d-block mx-auto mb-4">
            <h5 class="text-primary fw-bold mb-2">Configurando tu perfil...</h5>
            <p class="text-muted">Estamos preparando tu espacio de trabajo</p>
        </div>
        <div id="validando" class="text-center d-none py-5">
            <img src="/img/isotipo.png" alt="Validando..." class="animacion-fija d-block mx-auto mb-4">
            <h5 class="text-success fw-bold mb-2">¡Cuenta creada con éxito!</h5>
            <p class="text-muted">Redirigiendo al inicio de sesión...</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:inline="javascript">
        window.alertaError = [[${alertaError}]];
        const temaPrevio = localStorage.getItem('temaUniPlanner') || 'light';
        document.documentElement.setAttribute('data-bs-theme', temaPrevio);
    </script>
    <script src="/js/login.js"></script>
</body>
</html>
